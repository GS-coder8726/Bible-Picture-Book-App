<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="子ども向けの聖書の絵本アプリ。天地創造やアダムとエバなど、聖書のお話を美しいイラストと一緒に楽しめます。">
    <title>せいしょえほん 〜かみさまの おはなし〜</title>
    <link rel="stylesheet" href="styles.css?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- キラキラ背景装飾 -->
    <div class="sparkle-bg" aria-hidden="true">
        <div class="sparkle s1">✦</div>
        <div class="sparkle s2">★</div>
        <div class="sparkle s3">✦</div>
        <div class="sparkle s4">☆</div>
        <div class="sparkle s5">✦</div>
        <div class="sparkle s6">★</div>
        <div class="sparkle s7">✦</div>
        <div class="sparkle s8">☆</div>
        <div class="cloud c1" aria-hidden="true">☁</div>
        <div class="cloud c2" aria-hidden="true">☁</div>
        <div class="cloud c3" aria-hidden="true">☁</div>
    </div>

    <div id="app-container">
        <!-- ヘッダー（戻るボタンなど） -->
        <div id="header" class="hidden">
            <button id="back-btn" class="nav-btn small-btn" aria-label="本棚にもどる">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                もどる
            </button>
        </div>

        <!-- 本棚画面 -->
        <div id="bookshelf-container">
            <div class="bookshelf-header">
                <div class="title-icon">📖</div>
                <h1 class="bookshelf-title">せいしょえほん</h1>
                <p class="bookshelf-subtitle">〜 かみさまの おはなし 〜</p>
            </div>
            <div id="books-grid" class="books-grid"></div>
        </div>

        <!-- ページコンテンツ表示領域 -->
        <div id="top-controls" class="hidden">
            <button id="mute-btn" class="toggle-btn">🔊 音をけす</button>
            <button id="toggle-text-btn" class="toggle-btn">文字をかくす</button>
        </div>
        <div id="book-container" class="fade-in hidden">
            <div id="scene-image" class="scene-image"></div>
            <video id="scene-video" class="scene-image hidden" autoplay loop playsinline></video>
            <div class="glass-panel">
                <p id="scene-text"></p>
            </div>
        </div>
        
        <!-- コントロールボタン群 -->
        <div class="controls">
            <button id="prev-btn" class="nav-btn" aria-label="前のページ">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <button id="next-btn" class="nav-btn" aria-label="次のページ">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>

        <!-- 進行状況バー -->
        <div class="progress-bar-container">
            <div id="progress" class="progress"></div>
        </div>
    </div>
    <script src="app.js?v=4"></script>
</body>
</html>
