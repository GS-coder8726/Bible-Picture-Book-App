<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三大祝福</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <!-- ヘッダー（戻るボタンなど） -->
        <div id="header" class="hidden">
            <button id="back-btn" class="nav-btn small-btn" aria-label="本棚にもどる">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                もどる
            </button>
        </div>

        <div id="bookshelf-container">
            <h1 class="bookshelf-title">三大祝福</h1>
            <div id="books-grid" class="books-grid"></div>
        </div>

        <!-- ページコンテンツ表示領域 -->
        <div id="top-controls" class="hidden">
            <button id="mute-btn" class="toggle-btn">🔊 音をけす</button>
            <button id="toggle-text-btn" class="toggle-btn">文字をかくす</button>
        </div>
        <div id="book-container" class="fade-in hidden">
            <div id="scene-image" class="scene-image"></div>
            <video id="scene-video" class="scene-image hidden" autoplay loop playsinline></video>
            <div class="glass-panel">
                <p id="scene-text"></p>
            </div>
        </div>
        
        <!-- コントロールボタン群 -->
        <div class="controls">
            <button id="prev-btn" class="nav-btn" aria-label="前のページ">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <button id="next-btn" class="nav-btn" aria-label="次のページ">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>

        <!-- 進行状況バー -->
        <div class="progress-bar-container">
            <div id="progress" class="progress"></div>
        </div>
    </div>
    <script src="app.js?v=2"></script>
</body>
</html>
